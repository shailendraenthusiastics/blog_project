{% extends "base_admin.html" %}
{% block content %}
<h3 class="mb-4">Add Blog Tag</h3>

<form method="post" class="card p-4">
    {% csrf_token %}
    <div class="mb-3">
        <label for="name" class="form-label">Tag Name</label>
        <input type="text" id="name" name="name" class="form-control" value="{{ form_data.name|default:'' }}" required>
        {% if form_errors.name %}
            <div class="text-danger small mt-1" role="alert">{{ form_errors.name }}</div>
        {% endif %}
    </div>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-secondary">Save</button>
        <a href="/dashboard/tags/" class="btn btn-outline-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
