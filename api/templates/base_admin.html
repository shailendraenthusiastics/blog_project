<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .admin-sidebar {
            min-height: 100vh;
            width: 220px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/dashboard/">Admin Dashboard</a>
    <div class="d-flex gap-2">
        <a href="/dashboard/logout/" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <aside class="col-auto bg-light border-end admin-sidebar p-3">
            <div class="fw-semibold text-uppercase text-muted small mb-3">Dashboard</div>
            <div class="nav flex-column gap-1">
                <a class="nav-link" href="/dashboard/">Home</a>
                <a class="nav-link" href="/dashboard/blogs/">Blogs</a>
                <a class="nav-link" href="/dashboard/categories/">Categories</a>
                <a class="nav-link" href="/dashboard/tags/">Tags</a>
            </div>
        </aside>
        <main class="col py-4">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            {% endif %}

            {% block content %}{% endblock %}
        </main>
    </div>
</div>
</body>
</html>
