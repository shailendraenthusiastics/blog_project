services:
  - type: web
    name: blog-project
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    disk:
      name: blog-media
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: MEDIA_ROOT
        value: /var/data/media